<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SecuBot</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
    <link rel="stylesheet" href="taskpane.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SecuBot</h1>
            <p>Protection numérique</p>
        </div>

        <div class="input-section">
            <label for="urlInput">Lien à analyser :</label>
            <input type="text" id="urlInput" placeholder="Copiez-collez l'URL suspecte ici...">
            <button id="analyzeBtn">Lancer l'analyse manuelle</button>
            <button id="analyzeMailBtn" style="background-color: #2b579a; margin-top: 5px;">
                Analyser tout l'email
            </button>
        </div>

        <div id="loadingSection" class="hidden">
            <div class="spinner"></div>
            <p>Analyse VirusTotal & OTX en cours...<br><em>Veuillez patienter (~15 sec)</em></p>
        </div>

        <div id="resultSection" class="hidden">
            <h3 id="resultTitle">Résultat :</h3>
            <p id="resultText"></p>
        </div>
    </div>

    <script src="taskpane.js?v=6"></script>
</body>
</html>
